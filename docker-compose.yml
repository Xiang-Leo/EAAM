version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend/ancient_calculus.db:/app/ancient_calculus.db
    environment:
      - DATABASE_URL=sqlite:////app/ancient_calculus.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - ADMIN_UPLOAD_DIR=/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 浏览器默认请求同源 /api，由 Next.js 在容器网络内代理到 backend。
        # 默认不要填写 NEXT_PUBLIC_API_BASE_URL，否则会重新让浏览器直连后端端口。
        - NEXT_PUBLIC_API_BASE_URL=
        - API_PROXY_TARGET=http://backend:8000
    ports:
      - "127.0.0.1:9039:3000"
    depends_on:
      - backend
