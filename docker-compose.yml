version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9040:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/ancient_calculus.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 浏览器默认请求同源 /api，由 Next.js 在容器网络内代理到 backend。
        # 如需让浏览器直连后端，可设置 NEXT_PUBLIC_API_BASE_URL=http://公网IP:9040。
        - NEXT_PUBLIC_API_BASE_URL=
        - API_PROXY_TARGET=http://backend:8000
    ports:
      - "9039:3000"
    env_file:
      - .env
    depends_on:
      - backend
