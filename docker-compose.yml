version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9040:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/eaam.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ⚠️ 请把这里的 http://localhost:9040 替换为您的云主机公网IP，例如 http://1.2.3.4:9040
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:9040
    ports:
      - "9039:3000"
    env_file:
      - .env
    depends_on:
      - backend
